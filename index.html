<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Service Status Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-1: #0b121d;
      --bg-2: #101a2b;
      --panel: rgba(13, 22, 37, 0.72);
      --panel-soft: rgba(255, 255, 255, 0.04);
      --border: rgba(255, 255, 255, 0.14);
      --text: #e7eefc;
      --muted: #9aa8c6;
      --ok: #3fe38d;
      --down: #ff6d8f;
      --accent: #64b6ff;
      --glow: 0 22px 60px rgba(0, 0, 0, 0.35);
      --radius-lg: 20px;
      --radius-md: 14px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Manrope", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(800px 450px at 10% -10%, rgba(100, 182, 255, 0.30), transparent 60%),
        radial-gradient(900px 550px at 100% 10%, rgba(63, 227, 141, 0.18), transparent 58%),
        linear-gradient(160deg, var(--bg-1), var(--bg-2));
      padding: 24px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      gap: 18px;
      grid-template-columns: 1fr;
    }

    .card {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.07), var(--panel));
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--glow);
      backdrop-filter: blur(10px);
    }

    .top {
      padding: 22px;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-family: "Space Grotesk", sans-serif;
      font-size: clamp(24px, 4vw, 34px);
      letter-spacing: -0.02em;
    }

    .sub {
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      display: inline-block;
      background: #ffce67;
      box-shadow: 0 0 0 4px rgba(255, 206, 103, 0.18);
    }

    .dot.ok {
      background: var(--ok);
      box-shadow: 0 0 0 4px rgba(63, 227, 141, 0.2);
    }

    .dot.down {
      background: var(--down);
      box-shadow: 0 0 0 4px rgba(255, 109, 143, 0.2);
    }

    .actions { display: flex; gap: 10px; flex-wrap: wrap; }

    button, select, input {
      font: inherit;
      color: var(--text);
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.06);
      padding: 10px 12px;
    }

    select {
      background-color: #132038;
      color: var(--text);
    }

    select option {
      background-color: #132038;
      color: var(--text);
    }

    select:focus,
    input:focus,
    button:focus {
      outline: 2px solid rgba(100, 182, 255, 0.55);
      outline-offset: 1px;
    }

    button { cursor: pointer; }
    button:hover { transform: translateY(-1px); }

    .btn-primary {
      background: linear-gradient(120deg, rgba(100, 182, 255, 0.85), rgba(63, 227, 141, 0.8));
      color: #04111f;
      border: none;
      font-weight: 800;
    }

    .metrics {
      padding: 0 22px 20px;
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .metric {
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      background: var(--panel-soft);
      padding: 12px;
    }

    .metric .k { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.07em; }
    .metric .v { margin-top: 6px; font-size: 26px; font-weight: 800; }

    .main { display: grid; gap: 18px; }

    .services { padding: 18px; }

    .toolbar {
      display: grid;
      gap: 10px;
      grid-template-columns: 1fr auto auto;
      margin-bottom: 12px;
    }

    .status-grid {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      max-height: 560px;
      overflow: auto;
      padding-right: 4px;
    }

    .item {
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      background: rgba(255, 255, 255, 0.04);
      padding: 12px;
      display: grid;
      gap: 10px;
    }

    .item-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
    }

    .name { font-weight: 700; line-height: 1.25; }

    .badge {
      font-size: 12px;
      border-radius: 999px;
      padding: 5px 10px;
      border: 1px solid var(--border);
      color: var(--muted);
    }

    .badge.up { color: var(--ok); }
    .badge.down { color: var(--down); }

    .bar-wrap {
      height: 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.1);
      overflow: hidden;
    }

    .bar { height: 100%; width: 100%; }
    .bar.up { background: linear-gradient(90deg, var(--ok), rgba(63, 227, 141, 0.25)); }
    .bar.down { background: linear-gradient(90deg, var(--down), rgba(255, 109, 143, 0.25)); }

    .field { display: grid; gap: 6px; }
    .field label { color: var(--muted); font-size: 13px; }

    .hint { color: var(--muted); font-size: 12px; line-height: 1.4; }

    .state {
      color: var(--muted);
      font-size: 13px;
      min-height: 18px;
    }

    .state.error { color: var(--down); }
    .state.ok { color: var(--ok); }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(6, 10, 19, 0.7);
      backdrop-filter: blur(6px);
      display: none;
      place-items: center;
      z-index: 30;
      padding: 14px;
    }

    .modal-backdrop.show { display: grid; }

    .modal {
      width: min(540px, 100%);
      padding: 18px;
      display: grid;
      gap: 12px;
    }

    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .modal-head h2 {
      margin: 0;
      font-size: 18px;
      font-family: "Space Grotesk", sans-serif;
    }

    .icon-btn {
      border-radius: 10px;
      width: 36px;
      height: 36px;
      display: grid;
      place-items: center;
      padding: 0;
    }

    @media (max-width: 980px) {
      .status-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 700px) {
      body { padding: 14px; }
      .toolbar { grid-template-columns: 1fr; }
      .metrics { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <section class="card">
      <div class="top">
        <div>
          <h1>Service Status Console</h1>
          <div class="sub">
            <span id="overallDot" class="dot"></span>
            <span id="overallText">Loading...</span>
            <span>|</span>
            <span id="lastUpdated">Last updated: -</span>
          </div>
        </div>
        <div class="actions">
          <button id="refreshBtn" type="button">Refresh</button>
          <button id="autoBtn" type="button">Auto: On</button>
          <button id="openUpdateModal" class="btn-primary" type="button">Change Status</button>
        </div>
      </div>
      <div class="metrics">
        <div class="metric"><div class="k">Total</div><div id="totalCount" class="v">0</div></div>
        <div class="metric"><div class="k">Up</div><div id="upCount" class="v">0</div></div>
        <div class="metric"><div class="k">Down</div><div id="downCount" class="v">0</div></div>
      </div>
    </section>

    <section class="main">
      <article class="card services">
        <div class="toolbar">
          <input id="searchInput" type="text" placeholder="Search services" autocomplete="off" />
          <select id="filterSelect">
            <option value="all">All</option>
            <option value="up">Up only</option>
            <option value="down">Down only</option>
          </select>
          <div class="state" id="fetchState">Idle</div>
        </div>
        <div class="status-grid" id="serviceGrid"></div>
      </article>
    </section>
  </div>

  <div id="updateModalBackdrop" class="modal-backdrop" aria-hidden="true">
    <section class="card modal" role="dialog" aria-modal="true" aria-labelledby="updateModalTitle">
      <div class="modal-head">
        <h2 id="updateModalTitle">Update Service Status</h2>
        <button id="closeUpdateModal" class="icon-btn" type="button" aria-label="Close">x</button>
      </div>
      <div class="field">
        <label for="serviceSelect">Service</label>
        <select id="serviceSelect"></select>
      </div>
      <div class="field">
        <label for="statusSelect">Status</label>
        <select id="statusSelect">
          <option value="true">Up</option>
          <option value="false">Down</option>
        </select>
      </div>
      <button id="updateBtn" class="btn-primary" type="button">Update Status</button>
      <div class="hint">Status payload: <code>{ "name": "...", "up": true|false }</code></div>
      <div class="hint">Webhook payload: <code>{ "services": [{ "name": "...", "up": true|false }] }</code></div>
      <div class="hint">GET: <code id="readEndpoint"></code><br />POST: <code id="writeEndpoint"></code><br />Webhook: <code id="webhookEndpoint"></code></div>
      <div class="state" id="updateState"></div>
    </section>
  </div>

  <script>
    (() => {
      const READ_ENDPOINT = "https://spathose-hygienically-sarita.ngrok-free.dev/services";
      const WRITE_ENDPOINT = "https://spathose-hygienically-sarita.ngrok-free.dev/services/status";
      const WEBHOOK_ENDPOINT = "https://prod-10.norwayeast.logic.azure.com:443/workflows/1b7bd1f1febf499e929d98feb2c46839/triggers/When_an_HTTP_request_is_received/paths/invoke?api-version=2016-10-01&sp=%2Ftriggers%2FWhen_an_HTTP_request_is_received%2Frun&sv=1.0&sig=lTZN9aAV_YvMH7nhJKzCBPyadgNNtnWoY5YsPXzh-ck";
      const AUTO_REFRESH_MS = 30000;
      const COMMON_HEADERS = {
        "Accept": "application/json",
        "ngrok-skip-browser-warning": "true"
      };

      const state = {
        services: [],
        query: "",
        filter: "all",
        auto: true,
        timer: null
      };

      const el = {
        overallDot: document.getElementById("overallDot"),
        overallText: document.getElementById("overallText"),
        lastUpdated: document.getElementById("lastUpdated"),
        totalCount: document.getElementById("totalCount"),
        upCount: document.getElementById("upCount"),
        downCount: document.getElementById("downCount"),
        refreshBtn: document.getElementById("refreshBtn"),
        autoBtn: document.getElementById("autoBtn"),
        openUpdateModal: document.getElementById("openUpdateModal"),
        closeUpdateModal: document.getElementById("closeUpdateModal"),
        updateModalBackdrop: document.getElementById("updateModalBackdrop"),
        searchInput: document.getElementById("searchInput"),
        filterSelect: document.getElementById("filterSelect"),
        fetchState: document.getElementById("fetchState"),
        serviceGrid: document.getElementById("serviceGrid"),
        serviceSelect: document.getElementById("serviceSelect"),
        statusSelect: document.getElementById("statusSelect"),
        updateBtn: document.getElementById("updateBtn"),
        updateState: document.getElementById("updateState"),
        readEndpoint: document.getElementById("readEndpoint"),
        writeEndpoint: document.getElementById("writeEndpoint"),
        webhookEndpoint: document.getElementById("webhookEndpoint")
      };

      el.readEndpoint.textContent = READ_ENDPOINT;
      el.writeEndpoint.textContent = WRITE_ENDPOINT;
      el.webhookEndpoint.textContent = WEBHOOK_ENDPOINT;

      function openUpdateModal() {
        el.updateModalBackdrop.classList.add("show");
        el.updateModalBackdrop.setAttribute("aria-hidden", "false");
      }

      function closeUpdateModal() {
        el.updateModalBackdrop.classList.remove("show");
        el.updateModalBackdrop.setAttribute("aria-hidden", "true");
      }

      function formatDate(date) {
        return new Intl.DateTimeFormat(undefined, {
          year: "numeric",
          month: "short",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit"
        }).format(date);
      }

      function setFetchState(message, isError) {
        el.fetchState.textContent = message;
        el.fetchState.className = isError ? "state error" : "state";
      }

      function setUpdateState(message, kind) {
        el.updateState.textContent = message || "";
        el.updateState.className = kind ? `state ${kind}` : "state";
      }

      function computeSummary(services) {
        const total = services.length;
        const down = services.filter((s) => !s.up).length;
        return { total, down, up: total - down };
      }

      function renderOverall(summary) {
        el.totalCount.textContent = String(summary.total);
        el.upCount.textContent = String(summary.up);
        el.downCount.textContent = String(summary.down);

        if (summary.total === 0) {
          el.overallDot.className = "dot";
          el.overallText.textContent = "No services available";
          return;
        }

        if (summary.down === 0) {
          el.overallDot.className = "dot ok";
          el.overallText.textContent = "All systems operational";
          return;
        }

        el.overallDot.className = "dot down";
        el.overallText.textContent = `${summary.down} service${summary.down === 1 ? "" : "s"} down`;
      }

      function filteredServices() {
        const q = state.query.trim().toLowerCase();
        let items = state.services.slice();

        if (q) {
          items = items.filter((s) => s.name.toLowerCase().includes(q));
        }

        if (state.filter === "up") {
          items = items.filter((s) => s.up);
        } else if (state.filter === "down") {
          items = items.filter((s) => !s.up);
        }

        return items;
      }

      function renderServices() {
        const items = filteredServices();
        el.serviceGrid.innerHTML = "";

        if (!items.length) {
          const empty = document.createElement("div");
          empty.className = "item";
          empty.innerHTML = "<div class=\"name\">No services match this filter</div>";
          el.serviceGrid.appendChild(empty);
          return;
        }

        const frag = document.createDocumentFragment();

        for (const service of items) {
          const item = document.createElement("div");
          item.className = "item";

          const badgeClass = service.up ? "badge up" : "badge down";
          const barClass = service.up ? "bar up" : "bar down";
          const label = service.up ? "Up" : "Down";

          item.innerHTML = `
            <div class="item-top">
              <div class="name">${escapeHtml(service.name)}</div>
              <div class="${badgeClass}">${label}</div>
            </div>
            <div class="bar-wrap"><div class="${barClass}"></div></div>
          `;

          frag.appendChild(item);
        }

        el.serviceGrid.appendChild(frag);
      }

      function renderServicePicker() {
        const selected = el.serviceSelect.value;
        el.serviceSelect.innerHTML = "";

        for (const service of state.services) {
          const opt = document.createElement("option");
          opt.value = service.name;
          opt.textContent = service.name;
          el.serviceSelect.appendChild(opt);
        }

        if (state.services.length === 0) {
          const opt = document.createElement("option");
          opt.textContent = "No services loaded";
          opt.value = "";
          el.serviceSelect.appendChild(opt);
        } else if (selected && state.services.some((s) => s.name === selected)) {
          el.serviceSelect.value = selected;
        }
      }

      async function fetchServices() {
        const res = await fetch(READ_ENDPOINT, {
          method: "GET",
          mode: "cors",
          cache: "no-store",
          headers: COMMON_HEADERS
        });

        const raw = await res.text();

        if (!res.ok) {
          throw new Error(`GET failed: HTTP ${res.status} ${res.statusText}`);
        }

        if (raw.trim().startsWith("<")) {
          throw new Error("GET returned HTML instead of JSON");
        }

        const data = JSON.parse(raw);
        return Array.isArray(data && data.services) ? data.services : [];
      }

      async function loadServices() {
        setFetchState("Loading...", false);

        try {
          const services = await fetchServices();

          state.services = services
            .map((s) => ({ name: String(s && s.name ? s.name : ""), up: Boolean(s && s.up) }))
            .filter((s) => s.name)
            .sort((a, b) => a.name.localeCompare(b.name));

          renderOverall(computeSummary(state.services));
          renderServices();
          renderServicePicker();
          el.lastUpdated.textContent = `Last updated: ${formatDate(new Date())}`;
          setFetchState("Up to date", false);
        } catch (err) {
          setFetchState(String(err), true);
          if (!state.services.length) {
            renderOverall({ total: 0, up: 0, down: 0 });
            renderServices();
            renderServicePicker();
          }
        }
      }

      async function updateServiceStatus() {
        const name = el.serviceSelect.value;
        const up = el.statusSelect.value === "true";

        if (!name) {
          setUpdateState("Select a service first.", "error");
          return;
        }

        setUpdateState("Updating...", "");
        el.updateBtn.disabled = true;

        try {
          const res = await fetch(WRITE_ENDPOINT, {
            method: "POST",
            mode: "cors",
            headers: {
              ...COMMON_HEADERS,
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ name, up })
          });

          const payload = await res.text();
          if (!res.ok) {
            throw new Error(`POST failed: HTTP ${res.status} ${res.statusText} ${payload ? `| ${payload.slice(0, 160)}` : ""}`);
          }

          let webhookMessage = "and triggered webhook.";
          try {
            await triggerStatusWebhook([{ name, up }]);
          } catch (webhookErr) {
            webhookMessage = `but webhook failed: ${String(webhookErr)}`;
          }

          setUpdateState(`Updated ${name} to ${up ? "Up" : "Down"} ${webhookMessage}`, webhookMessage.startsWith("and") ? "ok" : "error");
          await loadServices();
          closeUpdateModal();
        } catch (err) {
          setUpdateState(String(err), "error");
        } finally {
          el.updateBtn.disabled = false;
        }
      }

      async function triggerStatusWebhook(services) {
        const res = await fetch(WEBHOOK_ENDPOINT, {
          method: "POST",
          mode: "cors",
          headers: {
            ...COMMON_HEADERS,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ services })
        });

        const raw = await res.text();
        if (!res.ok) {
          throw new Error(`Webhook failed: HTTP ${res.status} ${res.statusText} ${raw ? `| ${raw.slice(0, 160)}` : ""}`);
        }
      }

      function setAutoRefresh(on) {
        state.auto = on;
        el.autoBtn.textContent = `Auto: ${on ? "On" : "Off"}`;

        if (state.timer) {
          clearInterval(state.timer);
          state.timer = null;
        }

        if (on) {
          state.timer = setInterval(loadServices, AUTO_REFRESH_MS);
        }
      }

      function escapeHtml(value) {
        return value
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      el.refreshBtn.addEventListener("click", loadServices);
      el.autoBtn.addEventListener("click", () => setAutoRefresh(!state.auto));
      el.openUpdateModal.addEventListener("click", openUpdateModal);
      el.closeUpdateModal.addEventListener("click", closeUpdateModal);
      el.updateModalBackdrop.addEventListener("click", (event) => {
        if (event.target === el.updateModalBackdrop) {
          closeUpdateModal();
        }
      });
      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && el.updateModalBackdrop.classList.contains("show")) {
          closeUpdateModal();
        }
      });
      el.searchInput.addEventListener("input", (event) => {
        state.query = event.target.value;
        renderServices();
      });
      el.filterSelect.addEventListener("change", (event) => {
        state.filter = event.target.value;
        renderServices();
      });
      el.updateBtn.addEventListener("click", updateServiceStatus);

      setAutoRefresh(true);
      loadServices();
    })();
  </script>
</body>
</html>
